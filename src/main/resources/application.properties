spring.application.name=car_rental_management

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/carrentaldb
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.open-in-view=false



# AWS S3 Configuration
aws.s3.access-key=YOUR_AWS_ACCESS_KEY
aws.s3.secret-key=YOUR_AWS_SECRET_KEY
aws.s3.region=us-east-1
aws.s3.bucket-name=your-bucket-name

# File Upload Configuration
aws.s3.max-file-size=52428800
aws.s3.allowed-file-types=jpg,jpeg,png,pdf,doc,docx,xls,xlsx,txt,zip

# Video Upload Configuration
aws.s3.max-video-size=5368709120
aws.s3.allowed-video-types=mp4,avi,mov,mkv,flv,wmv,webm,3gp

# Spring Web Configuration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# JWT Configuration
jwt.secret=your_very_secret_key_here_minimum_32_characters_long_required_for_hs256_algorithm_security
jwt.expiration=86400000

# Server Configuration
server.port=8080
server.servlet.context-path=/api

