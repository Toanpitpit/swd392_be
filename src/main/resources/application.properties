spring.application.name=${SPRING_APPLICATION_NAME:car_rental_management}

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/carrentaldb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.use_sql_comments=${JPA_USE_SQL_COMMENTS:false}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}

# AWS S3 Configuration
aws.s3.access-key=${AWS_S3_ACCESS_KEY:YOUR_AWS_ACCESS_KEY}
aws.s3.secret-key=${AWS_S3_SECRET_KEY:YOUR_AWS_SECRET_KEY}
aws.s3.region=${AWS_S3_REGION:ap-southeast-2}
aws.s3.bucket-name=${AWS_S3_BUCKET_NAME:your-bucket-name}

# File Upload Configuration
aws.s3.max-file-size=${AWS_S3_MAX_FILE_SIZE:52428800}
aws.s3.allowed-file-types=${AWS_S3_ALLOWED_FILE_TYPES:jpg,jpeg,png,pdf,doc,docx,xls,xlsx,txt,zip}

# Video Upload Configuration
aws.s3.max-video-size=${AWS_S3_MAX_VIDEO_SIZE:5368709120}
aws.s3.allowed-video-types=${AWS_S3_ALLOWED_VIDEO_TYPES:mp4,avi,mov,mkv,flv,wmv,webm,3gp}

# Spring Web Configuration
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:500MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:500MB}

# JWT Configuration
jwt.secret=${JWT_SECRET:your_very_secret_key_here_minimum_32_characters_long_required_for_hs256_algorithm_security}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/api}

